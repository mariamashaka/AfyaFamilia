<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afya Familia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #FAFFFE;
      color: #222;
    }

    header {
      background: #2E7D52;
      color: white;
      padding: 16px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
    }

    header p {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 2px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    .member-card {
      background: #E8F5EE;
      border: 1px solid #4CAF7D;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .member-card:active {
      background: #d4edde;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #2E7D52;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      font-weight: 600;
      flex-shrink: 0;
    }

    .member-info {
      flex: 1;
    }

    .member-name {
      font-size: 17px;
      font-weight: 600;
      color: #2E7D52;
    }

    .member-age {
      font-size: 13px;
      color: #555;
      margin-top: 2px;
    }

    .reminder {
      background: #E8872A;
      color: white;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      margin-top: 7px;
      line-height: 1.4;
    }

    .add-btn {
      width: 100%;
      padding: 16px;
      background: #4CAF7D;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }

    footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

<header>
  <h1>Afya Familia</h1>
  <p>Afya ya familia yako mikononi mwako</p>
</header>

<div class="container">

  <div class="member-card">
    <div class="avatar">T</div>
    <div class="member-info">
      <div class="member-name">Toshka</div>
      <div class="member-age">Miaka 11</div>
      <div class="reminder">Paracetamol 250mg × 3/siku — hadi tarehe 5</div>
    </div>
  </div>

  <div class="member-card">
    <div class="avatar">M</div>
    <div class="member-info">
      <div class="member-name">Maria</div>
      <div class="member-age">Miaka 38</div>
    </div>
  </div>

  <div class="member-card">
    <div class="avatar">V</div>
    <div class="member-info">
      <div class="member-name">Vanessa</div>
      <div class="member-age">Miaka 7</div>
    </div>
  </div>

  <button class="add-btn">+ Ongeza mwanafamilia</button>

</div>

<footer>
  Imetengenezwa na Dkt. Maria Rukavishnikova
</footer>

</body>
</html>
