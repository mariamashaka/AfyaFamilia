<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afya Familia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #FAFFFE;
      color: #222;
    }

    header {
      background: #2E7D52;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 0 8px 0 0;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    .profile-card {
      background: #E8F5EE;
      border: 1px solid #4CAF7D;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #2E7D52;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      font-weight: 600;
      flex-shrink: 0;
    }

    .profile-info {
      flex: 1;
    }

    .profile-name {
      font-size: 20px;
      font-weight: 600;
      color: #2E7D52;
    }

    .profile-detail {
      font-size: 13px;
      color: #555;
      margin-top: 4px;
      line-height: 1.5;
    }

    .edit-btn {
      background: none;
      border: 1px solid #4CAF7D;
      color: #2E7D52;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 10px;
    }

    .reminder {
      background: #E8872A;
      color: white;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .reminder-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .section-btn {
      width: 100%;
      padding: 18px 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-current {
      background: #E8872A;
      color: white;
    }

    .btn-acute {
      background: #4CAF7D;
      color: white;
    }

    .btn-chronic {
      background: #2E7D52;
      color: white;
    }

    .btn-icon {
      font-size: 22px;
    }

    .btn-text {
      flex: 1;
    }

    .btn-arrow {
      font-size: 18px;
      opacity: 0.8;
    }

    footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="history.back()">←</button>
  <h1>Toshka</h1>
</header>

<div class="container">

  <div class="profile-card">
    <div class="avatar">T</div>
    <div class="profile-info">
      <div class="profile-name">Toshka</div>
      <div class="profile-detail">
        Umri: miaka 11<br>
        Uzito: kg 35<br>
        Mzio: Penicillin
      </div>
      <button class="edit-btn">✏️ Hariri taarifa</button>
    </div>
  </div>

  <div class="reminder">
    <div class="reminder-title">⚠️ Kukumbushwa leo:</div>
    Paracetamol 250mg — mara 3 kwa siku — hadi tarehe 5<br>
    Zinc 10mg — mara 1 kwa siku — hadi tarehe 7<br>
    ORS — kila wakati wa kuhara
  </div>

<a href="current-illness.html" class="section-btn btn-current" style="text-decoration:none;">
    <span class="btn-icon">🤒</span>
    <span class="btn-text">Ugonjwa wa sasa</span>
    <span class="btn-arrow">›</span>
  </button>

  <button class="section-btn btn-acute">
    <span class="btn-icon">📋</span>
    <span class="btn-text">Magonjwa ya awali</span>
    <span class="btn-arrow">›</span>
  </button>

  <button class="section-btn btn-chronic">
    <span class="btn-icon">📌</span>
    <span class="btn-text">Magonjwa sugu</span>
    <span class="btn-arrow">›</span>
  </button>

</div>

<footer>
  Imetengenezwa na Dkt. Maria Rukavishnikova
</footer>

</body>
</html>
